<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arxitektor Komilov | Loyiha & Dizayn</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8d08a;
    --dark: #0d0d0d;
    --dark2: #161410;
    --dark3: #1e1a15;
    --cream: #f5f0e8;
    --text-muted: #8a7d6a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,168,76,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 80% 80%, rgba(201,168,76,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 48px 24px 64px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Top divider */
  .top-line {
    width: 1px;
    height: 48px;
    background: linear-gradient(to bottom, transparent, var(--gold));
    margin-bottom: 32px;
    animation: growDown 1s ease forwards;
  }

  @keyframes growDown {
    from { height: 0; opacity: 0; }
    to { height: 48px; opacity: 1; }
  }

  /* Avatar / Icon */
  .avatar {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    background: var(--dark3);
    border: 1.5px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    margin-bottom: 24px;
    box-shadow: 0 0 40px rgba(201,168,76,0.15), inset 0 0 20px rgba(201,168,76,0.05);
    animation: fadeUp 0.8s ease 0.2s both;
  }

  /* Header */
  .name {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.02em;
    text-align: center;
    color: var(--cream);
    animation: fadeUp 0.8s ease 0.3s both;
  }

  .title {
    font-size: 13px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-top: 6px;
    text-align: center;
    animation: fadeUp 0.8s ease 0.35s both;
  }

  /* Divider ornament */
  .ornament {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 28px 0;
    width: 100%;
    animation: fadeUp 0.8s ease 0.4s both;
  }

  .ornament-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(201,168,76,0.4), transparent);
  }

  .ornament-diamond {
    width: 6px;
    height: 6px;
    background: var(--gold);
    transform: rotate(45deg);
  }

  /* Services */
  .services {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 32px;
    animation: fadeUp 0.8s ease 0.45s both;
  }

  .service-tag {
    background: var(--dark3);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 4px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 0.02em;
  }

  .service-tag span.icon {
    font-size: 16px;
  }

  .badge {
    width: 100%;
    background: linear-gradient(135deg, rgba(201,168,76,0.12), rgba(201,168,76,0.04));
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 4px;
    padding: 12px 18px;
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold-light);
    text-align: center;
    margin-bottom: 36px;
    animation: fadeUp 0.8s ease 0.5s both;
  }

  /* Links */
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    padding: 16px 20px;
    background: var(--dark3);
    border: 1px solid rgba(201,168,76,0.18);
    border-radius: 6px;
    text-decoration: none;
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    letter-spacing: 0.04em;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    opacity: 0;
    transform: translateY(16px);
  }

  .link-btn::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--gold);
    transform: scaleY(0);
    transition: transform 0.3s ease;
  }

  .link-btn:hover {
    border-color: rgba(201,168,76,0.5);
    background: rgba(201,168,76,0.06);
    transform: translateX(4px);
    color: var(--cream);
  }

  .link-btn:hover::before {
    transform: scaleY(1);
  }

  .link-icon {
    font-size: 20px;
    width: 28px;
    text-align: center;
    flex-shrink: 0;
  }

  .link-label {
    flex: 1;
    font-weight: 400;
  }

  .link-arrow {
    font-size: 14px;
    color: var(--gold);
    opacity: 0.6;
    transition: opacity 0.3s, transform 0.3s;
  }

  .link-btn:hover .link-arrow {
    opacity: 1;
    transform: translateX(3px);
  }

  /* Animate links in sequence */
  .link-btn:nth-child(1) { animation: fadeUp 0.6s ease 0.55s forwards; }
  .link-btn:nth-child(2) { animation: fadeUp 0.6s ease 0.65s forwards; }
  .link-btn:nth-child(3) { animation: fadeUp 0.6s ease 0.75s forwards; }
  .link-btn:nth-child(4) { animation: fadeUp 0.6s ease 0.85s forwards; }
  .link-btn:nth-child(5) { animation: fadeUp 0.6s ease 0.95s forwards; }
  .link-btn:nth-child(6) { animation: fadeUp 0.6s ease 1.05s forwards; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Footer */
  .footer {
    margin-top: 48px;
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(138,125,106,0.4);
    animation: fadeUp 0.8s ease 1.2s both;
  }

  .bottom-line {
    width: 1px;
    height: 32px;
    background: linear-gradient(to bottom, var(--gold), transparent);
    margin: 0 auto 16px;
  }
</style>
</head>
