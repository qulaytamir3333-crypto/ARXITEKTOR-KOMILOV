<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arxitektor Komilov</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Montserrat:wght@300;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0c0c0c;
    color: #e0e0e0;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
  }
  .page {
    width: 100%;
    max-width: 420px;
    padding: 56px 24px 64px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* LOGO */
  .logo { width: 96px; height: 96px; object-fit: contain; margin-bottom: 20px; animation: up 0.7s ease both; }

  /* NAME */
  .name-block { text-align: center; margin-bottom: 8px; animation: up 0.7s 0.1s ease both; }
  .name-top { font-size: 10px; letter-spacing: 0.4em; text-transform: uppercase; color: #666; font-weight: 300; }
  .name-main { font-family: 'Montserrat', sans-serif; font-size: 26px; font-weight: 700; letter-spacing: 0.12em; color: #fff; text-transform: uppercase; }

  /* DIVIDER */
  .line { width: 32px; height: 1px; background: #c9952a; margin: 20px auto 20px; animation: up 0.7s 0.15s ease both; }

  /* SERVICES */
  .services { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 24px; animation: up 0.7s 0.2s ease both; }
  .svc { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: #888; border: 1px solid #222; padding: 6px 12px; }

  /* BADGE */
  .badge { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: #c9952a; margin-bottom: 32px; animation: up 0.7s 0.25s ease both; }

  /* LINKS */
  .links { width: 100%; display: flex; flex-direction: column; gap: 8px; }

  .link-btn {
    display: flex; align-items: center; gap: 14px;
    width: 100%; padding: 14px 18px;
    background: #111;
    border: 1px solid #1e1e1e;
    text-decoration: none;
    color: #ccc;
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 400;
    transition: all 0.25s ease;
    opacity: 0;
    transform: translateY(10px);
  }
  .link-btn:hover { background: #161616; border-color: #c9952a; color: #fff; }
  .link-btn:hover .arr { color: #c9952a; transform: translateX(3px); }

  .link-btn:nth-child(1){animation:up 0.5s 0.35s ease forwards;}
  .link-btn:nth-child(2){animation:up 0.5s 0.42s ease forwards;}
  .link-btn:nth-child(3){animation:up 0.5s 0.49s ease forwards;}
  .link-btn:nth-child(4){animation:up 0.5s 0.56s ease forwards;}
  .link-btn:nth-child(5){animation:up 0.5s 0.63s ease forwards;}
  .link-btn:nth-child(6){animation:up 0.5s 0.70s ease forwards;}

  .ico { width: 20px; height: 20px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .ico svg { width: 20px; height: 20px; }
  .lbl { flex: 1; }
  .arr { font-size: 14px; color: #444; transition: all 0.25s; }

  @keyframes up { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  .footer { margin-top: 48px; font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: #2a2a2a; animation: up 0.7s 0.9s ease both; }
</style>
</head>
